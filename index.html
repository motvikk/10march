<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ожидание чуда...</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ffc3a0);
    background-size: 400% 400%;
    animation: gradient 12s ease infinite;
    text-align: center;
    color: white;
    overflow: hidden;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

h1 {
    margin-top: 80px;
    font-size: 42px;
}

#countdown {
    font-size: 40px;
    margin-top: 20px;
}

button {
    margin-top: 40px;
    padding: 15px 35px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff4b6e;
    cursor: not-allowed;
    opacity: 0.6;
    transition: 0.3s;
}

button.active {
    cursor: pointer;
    opacity: 1;
    background: #ff4b6e;
    color: white;
    box-shadow: 0 0 20px rgba(255,255,255,0.8);
}

.heart {
    position: absolute;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-10vh); }
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<h1>До дня рождения осталось 💖</h1>
<div id="countdown"></div>

<button id="openBtn" disabled>Открыть подарок 🎁</button>

<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// Установи ГОД актуальный
const birthday = new Date("2026-03-10T00:00:00");

const countdownEl = document.getElementById("countdown");
const btn = document.getElementById("openBtn");

setInterval(() => {
    const now = new Date();
    let target = new Date(now.getFullYear(), 2, 10);

    if(now > target){
        target = new Date(now.getFullYear()+1, 2, 10);
    }

    const diff = target - now;

    if(diff <= 0){
        countdownEl.innerHTML = "🎉 С ДНЁМ РОЖДЕНИЯ!!! 🎉";
        btn.disabled = false;
        btn.classList.add("active");
        btn.style.cursor = "pointer";
        btn.onclick = () => window.location.href = "birthday.html";
        return;
    }

    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/1000/60)%60);
    const seconds = Math.floor((diff/1000)%60);

    countdownEl.innerHTML = `${days}д ${hours}ч ${minutes}м ${seconds}с`;
},1000);

// падающие сердечки
setInterval(()=>{
    const heart = document.createElement("div");
    heart.innerHTML = "💗";
    heart.classList.add("heart");
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*5) + "s";
    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(),8000);
},400);

</script>

</body>
</html>
